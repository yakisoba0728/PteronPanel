services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: pteron
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pteron}
      POSTGRES_DB: pteron
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pteron"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: build
    command: ["pnpm", "prisma", "migrate", "deploy"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://pteron:${DB_PASSWORD:-pteron}@db:5432/pteron?schema=public
    depends_on:
      db:
        condition: service_healthy

  seed:
    build:
      context: .
      target: build
    command: ["pnpm", "db:seed"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://pteron:${DB_PASSWORD:-pteron}@db:5432/pteron?schema=public
    depends_on:
      migrate:
        condition: service_completed_successfully

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://pteron:${DB_PASSWORD:-pteron}@db:5432/pteron?schema=public
    ports:
      - "3000:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
